# Server configuration
server.port=8081

# Application name
spring.application.name=weather-app

# Thymeleaf configuration
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Slack Configuration
# To enable Slack notifications, set these properties:
# slack.webhook.url=https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
# slack.notifications.enabled=true

# Default values (notifications disabled)
slack.webhook.url=
slack.notifications.enabled=false

# Logging configuration
logging.level.com.apad.weather=INFO
logging.level.org.springframework.web=DEBUG
logging.level.com.apad.weather.service.SlackNotificationService=DEBUG